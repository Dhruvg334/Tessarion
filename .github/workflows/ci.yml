name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      TESSARION_EVAL_MODE: local
      TESSARION_AI_PROVIDER: local
      TESSARION_RERANK_PROVIDER: local
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      TESSARION_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run eval:rag
      - run: npm run eval:concepts
      - run: npm run eval:teachback
      - run: npm run build
      - run: npm audit --audit-level=moderate
