name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      TESSARION_EVAL_MODE: local
      TESSARION_AI_PROVIDER: local
      TESSARION_RERANK_PROVIDER: local
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      TESSARION_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run unit tests
        run: npm run test:run

      - name: Run RAG evaluation
        run: npm run eval:rag

      - name: Run Concepts evaluation
        run: npm run eval:concepts

      - name: Run Teach-Back evaluation
        run: npm run eval:teachback

      - name: Run Mastery evaluation
        run: npm run eval:mastery

      - name: Run Review evaluation
        run: npm run eval:review

      - name: Run Tutoring evaluation
        run: npm run eval:tutoring

      - name: Build Next.js app
        run: npm run build
      - run: npm audit --audit-level=moderate
